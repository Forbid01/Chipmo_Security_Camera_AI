name: Agent Installer (macOS)

on:
  push:
    branches: [main]
    paths:
      - "agent/installer/macos/**"
      - ".github/workflows/agent-installer-macos.yml"
    tags:
      - "agent-v*"
  pull_request:
    paths:
      - "agent/installer/macos/**"
      - ".github/workflows/agent-installer-macos.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Lint shell + plist
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          brew install shellcheck
          shellcheck -S warning \
              agent/installer/macos/build.sh \
              agent/installer/macos/run-agent.sh \
              agent/installer/macos/uninstall.sh \
              agent/installer/macos/scripts/preinstall \
              agent/installer/macos/scripts/postinstall

      - name: Validate LaunchDaemon plist
        run: |
          # plutil -lint rejects malformed plists (mismatched dict keys,
          # bad escape sequences). @SENTRY_IMAGE@ placeholders are
          # accepted as string literals so we can lint unedited.
          plutil -lint agent/installer/macos/mn.sentry.agent.plist

  build:
    name: Build sentry-agent.pkg
    runs-on: macos-latest
    needs: [validate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          ref="${GITHUB_REF}"
          if [[ "$ref" == refs/tags/agent-v* ]]; then
            version="${ref#refs/tags/agent-v}"
          else
            version="0.0.0-${GITHUB_SHA::8}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Import signing cert
        if: ${{ secrets.MACOS_CERT_BASE64 != '' }}
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > /tmp/installer.p12
          KEYCHAIN=build.keychain
          # Random keychain password — we destroy the keychain in a
          # trap step after the build completes.
          KEYCHAIN_PW="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import /tmp/installer.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f /tmp/installer.p12
          # Identity name is stored under SIGN_IDENTITY_NAME so the
          # build step picks it up.
          echo "SIGN_IDENTITY=${{ secrets.MACOS_SIGN_IDENTITY }}" >> "$GITHUB_ENV"

      - name: Build pkg
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/sentry-agent:latest
        run: |
          args=(
            --version "${{ steps.version.outputs.version }}"
            --image "$IMAGE"
          )
          if [[ -n "${SIGN_IDENTITY:-}" ]]; then
            args+=(--sign-identity "$SIGN_IDENTITY")
          fi
          bash agent/installer/macos/build.sh "${args[@]}"
          ls -la agent/installer/macos/dist/

      - name: Verify signature
        if: ${{ secrets.MACOS_CERT_BASE64 != '' }}
        run: |
          pkgutil --check-signature agent/installer/macos/dist/sentry-agent.pkg

      - name: Notarize
        if: ${{ secrets.MACOS_NOTARY_KEY_ID != '' }}
        env:
          KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
        run: |
          # Apple notarization via notarytool. The private-key p8
          # file lives in /tmp for exactly this command then gets
          # wiped.
          echo "$KEY_P8" > /tmp/AuthKey.p8
          xcrun notarytool submit agent/installer/macos/dist/sentry-agent.pkg \
              --key /tmp/AuthKey.p8 \
              --key-id "$KEY_ID" \
              --issuer "$ISSUER" \
              --wait
          xcrun stapler staple agent/installer/macos/dist/sentry-agent.pkg
          rm -f /tmp/AuthKey.p8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentry-agent-macos-${{ steps.version.outputs.version }}
          path: agent/installer/macos/dist/sentry-agent.pkg
          retention-days: 30
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/agent-v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/installer/macos/dist/sentry-agent.pkg
