[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt",
  "cd security-web && npm ci"
]

[phases.build]
cmds = [
  "cd security-web && npm run build"
]

[start]
cmd = "uvicorn shoplift_detector.main:app --host 0.0.0.0 --port ${PORT:-8000}"
