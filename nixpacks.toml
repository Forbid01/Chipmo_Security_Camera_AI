[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt",
  "cd security-web && npm ci"
]

[phases.build]
cmds = [
  "cd security-web && npm run build"
]

[start]
# Run migrations before the server boots — nixpacks does NOT honour the
# Procfile `release:` phase, so `alembic upgrade head` has to live here or
# schema drift breaks every new deploy.
cmd = "alembic upgrade head && uvicorn shoplift_detector.main:app --host 0.0.0.0 --port ${PORT:-8000}"
