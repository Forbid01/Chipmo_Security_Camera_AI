target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long (handled by formatter for most cases)
]

[lint.isort]
known-first-party = ["shoplift_detector"]

[format]
quote-style = "double"
indent-style = "space"
