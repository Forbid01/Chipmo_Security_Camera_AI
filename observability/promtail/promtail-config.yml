# Promtail ships container stdout/stderr into Loki.
# Reads the Docker daemon's container log directory and attaches the
# container name + compose service as labels so `{service="chipmo-backend"}`
# queries work out of the box in Grafana Explore.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: container_name
        regex: "/(.*)"
        replacement: "$1"
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
      - action: labelmap
        regex: __meta_docker_container_label_(chipmo_.+)
