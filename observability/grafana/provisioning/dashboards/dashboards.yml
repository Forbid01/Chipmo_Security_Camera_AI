apiVersion: 1

# Dashboard provider. Grafana watches the referenced folder and
# auto-imports any *.json dashboards dropped there. T02-11 will ship
# the first dashboard (alert rate, FP rate, GPU, latency, camera
# uptime). Until then this provider is active but picks up zero files.

providers:
  - name: chipmo-dashboards
    orgId: 1
    folder: Chipmo
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/chipmo
      foldersFromFilesStructure: false
