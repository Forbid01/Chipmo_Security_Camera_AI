version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chipmo-security-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chipmo-net

  postgres:
    image: postgres:15-alpine
    container_name: chipmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chipmo_security}
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-chipmo_security}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chipmo-net

  redis:
    image: redis:7-alpine
    container_name: chipmo-redis
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chipmo-net

volumes:
  postgres_data:
  redis_data:

networks:
  chipmo-net:
    driver: bridge
